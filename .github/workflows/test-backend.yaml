name: Test Backend

on:
  pull_request:
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}/backend
  UV_VERSION: "0.7.x"

defaults:
  run:
    working-directory: ./backend

jobs:
  verify-model-up-to-date:
    # Staleness gate: confirms the committed model.py / model.ts match what
    # `gen-pydantic` / `gen-typescript` produce from the committed schema.
    # Catches forgotten regenerations on any PR (including release PRs) without
    # fetching anything from upstream — pure local determinism check.
    runs-on: ubuntu-latest
    defaults:
      run:
        # Override the file-level default (./backend) — this job uses
        # repo-root-relative paths and invokes the root Makefile.
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Set up Bun
        # Needed for `make format`'s frontend lint step (model.ts uses prettier).
        uses: oven-sh/setup-bun@v2

      - name: Install backend
        run: make install-backend

      - name: Install frontend
        working-directory: ./frontend
        run: bun install

      - name: Regenerate model (gen-pydantic + gen-typescript + format)
        # Same pipeline contributors run locally — formatting included so the diff
        # check below isn't a false positive from style alone.
        run: make model

      - name: Fail if committed model is stale
        run: |
          if ! git diff --quiet -- \
              backend/src/monarch_py/datamodels/model.py \
              frontend/src/api/model.ts; then
            echo "::error::Committed model.py / model.ts are out of sync with the schema."
            echo "Run \`make model\` locally and commit the result, or trigger the"
            echo "'Update KG Schema' workflow to refresh from the latest published schema."
            git --no-pager diff -- \
              backend/src/monarch_py/datamodels/model.py \
              frontend/src/api/model.ts | head -200
            exit 1
          fi

  test-backend:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}

      - name: Verify lockfile is up-to-date
        run: |
          uv lock --check

      - name: Install library
        run: |
          uv sync --extra dev

      - name: Run tests
        run: |
          uv run pytest tests
        shell: bash

      - name: Generate coverage report
        run: |
          uv run coverage run -m pytest tests
          uv run coverage xml
          uv run coverage report -m
        shell: bash

      - name: Upload coverage report
        if: github.repository == 'monarch-initiative/monarch-app'
        uses: codecov/codecov-action@v6.0.2
        with:
          name: codecov-results-${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
