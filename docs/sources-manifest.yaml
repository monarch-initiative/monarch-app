    branch: main
    filename: ctd.md
  - repo: monarch-initiative/dictybase-ingest
    branch: main
    filename: dictybase.md
  - repo: monarch-initiative/dismech
    branch: main
    filename: dismech.md
  - repo: monarch-initiative/go-ingest
    branch: main
    filename: go.md
  - repo: monarch-initiative/hgnc-ingest
    branch: main
    filename: hgnc.md
  - repo: monarch-initiative/maxo-annotation-ingest
