# Source documentation manifest for Monarch ingest repositories.
#
# Each entry defines an upstream repo whose README will be fetched
# and placed into docs/Sources/ as the given filename.
#
# Fields:
#   repo      - GitHub org/repo (e.g. monarch-initiative/alliance-ingest)
#   branch    - Git branch to fetch from
#   filename  - Target markdown filename written to docs/Sources/
#
# Used by the fetch script (scripts/fetch-source-docs.py) to keep
# ingest documentation in sync with the upstream repositories.

sources:
  - repo: monarch-initiative/alliance-ingest
    branch: main
    filename: alliance.md
  - repo: monarch-initiative/bgee-ingest
    branch: main
    filename: bgee.md
