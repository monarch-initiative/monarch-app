    description: Source file stem injected by koza at load time.
    range: string
    multivalued: false
  provided_by:
    description: Source file stem injected by koza at load time (KGX convention).
    range: string
    multivalued: false
  id:
    exact_mappings:
    - biolink:id
    slot_uri: biolink:id
