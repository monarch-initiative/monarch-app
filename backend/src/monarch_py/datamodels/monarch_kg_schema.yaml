      aggregations).
    slots:
    - id
    - category
    - name
    - xref
    - synonym
    - full_name
    - in_taxon
    - in_taxon_label
    - symbol
    - file_source
    - provided_by
    - type
    - description
    - iri
    - has_attribute
    - has_biological_sex
    - exact_synonym
    - broad_synonym
